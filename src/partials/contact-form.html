        <form class="contact-form" data-contact-form action="#" method="post">
          <div class="field">
            <label for="f-name">Your name</label>
            <input id="f-name" name="name" type="text" autocomplete="name" required />
          </div>
          <div class="field">
            <label for="f-email">Email address</label>
            <input id="f-email" name="email" type="email" autocomplete="email" required />
          </div>
          <div class="field">
            <label for="f-msg">What are we building?</label>
            <textarea id="f-msg" name="message" rows="3" required></textarea>
          </div>
          <button type="submit" class="btn btn--solid" data-magnetic>
            Send enquiry <span class="btn-arrow" aria-hidden="true">→</span>
          </button>
          <p class="form-note" data-form-note></p>
        </form>
