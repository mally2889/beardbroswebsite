<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact Beard Bros — Creative &amp; Digital Agency, Mumbai</title>
    <meta
      name="description"
      content="Tell Beard Bros where you want your brand to go. Mumbai-based creative and digital agency — performance marketing, branding, web and content. We reply within one working day."
    />
    <meta property="og:title" content="Contact Beard Bros — Mumbai Creative &amp; Digital Agency" />
    <meta
      property="og:description"
      content="Have a brand worth building? Tell us where you want to go — we'll bring the map, the engine and the momentum."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://beardbros.in/contact/" />
    <meta name="theme-color" content="#0b0a08" />
    <link rel="canonical" href="https://beardbros.in/contact/" />

    <!--@include partials/head-common.html-->

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "ContactPage",
        "name": "Contact Beard Bros",
        "url": "https://beardbros.in/contact/",
        "about": {
          "@type": "Organization",
          "name": "Beard Bros",
          "url": "https://beardbros.in",
          "address": { "@type": "PostalAddress", "addressLocality": "Mumbai", "addressCountry": "IN" },
          "sameAs": [
            "https://www.instagram.com/beardbrosagency",
            "https://www.linkedin.com/company/beard-bros",
            "https://www.facebook.com/BeardBrosCreative"
          ]
        }
      }
    </script>
  </head>
  <body>
    <!--@include partials/chrome.html-->

    <main id="main">
      <section class="section contact contact--page">
        <p class="hero-eyebrow contact-eyebrow" data-scramble-eyebrow>
          <span class="pulse" aria-hidden="true"></span>
          Let's talk
        </p>
        <h1 class="h-display contact-title" data-page-title>
          Have a brand worth <em class="h-serif">building?</em>
        </h1>
        <p class="contact-sub">
          Tell us where you want to go. We'll bring the map, the engine and the momentum — we
          reply within one working day.
        </p>

        <!--@include partials/contact-form.html-->

        <div class="contact-alt" data-reveal-block>
          <span>Mumbai, India</span>
          <a href="https://www.instagram.com/beardbrosagency" target="_blank" rel="noopener">Instagram</a>
          <a href="https://www.linkedin.com/company/beard-bros" target="_blank" rel="noopener">LinkedIn</a>
          <a href="https://www.facebook.com/BeardBrosCreative" target="_blank" rel="noopener">Facebook</a>
        </div>
      </section>
    </main>

    <!--@include partials/footer.html-->

    <script type="module" src="/src/contact.js"></script>
  </body>
</html>
